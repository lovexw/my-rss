        // 渲染页面
        function renderFeeds() {
            const container = document.getElementById('feeds-container');
            container.innerHTML = '';

            data.forEach(group => {
                const section = document.createElement('div');
                section.className = 'bg-white rounded-xl shadow-sm border border-gray-100 p-5';
                
                let itemsHtml = group.items.map(item => `
                    <div class="flex items-center justify-between py-3 border-b border-gray-50 last:border-0 hover:bg-gray-50 transition-colors px-2 rounded -mx-2">
                        <div class="truncate pr-4">
                            <a href="${item.htmlUrl}" target="_blank" class="text-sm font-medium text-gray-800 hover:text-blue-600 truncate">${item.title}</a>
                        </div>
                        <button onclick="copyText('${item.xmlUrl}')" class="text-xs bg-gray-100 hover:bg-gray-200 text-gray-600 px-3 py-1.5 rounded-md transition whitespace-nowrap">
                            复制 RSS
                        </button>
                    </div>
                `).join('');

                section.innerHTML = `
                    <h2 class="text-xl font-bold text-gray-800 border-b-2 border-blue-500 pb-2 inline-block mb-4">${group.category}</h2>
                    <div class="flex flex-col">${itemsHtml}</div>
                `;
                container.appendChild(section);
            });
        }

        // 复制单条文本内容
        function copyText(text) {
            navigator.clipboard.writeText(text).then(() => {
                showToast("链接已复制！");
            });
        }

        // 复制全部 RSS 链接
        function copyAllLinks() {
            const allUrls = data.flatMap(group => group.items.map(item => item.xmlUrl)).join('\n');
            navigator.clipboard.writeText(allUrls).then(() => {
                showToast("全部 RSS 链接已复制！");
            });
        }

        // 导出 OPML 文件
        function exportOPML() {
            let opmlContent = `<?xml version="1.0" encoding="UTF-8"?>\n<opml version="2.0">\n<head>\n<title>Feeds</title>\n</head>\n<body>\n`;
            
            data.forEach(group => {
                opmlContent += `  <outline title="${escapeXML(group.category)}" text="${escapeXML(group.category)}">\n`;
                group.items.forEach(item => {
                    opmlContent += `    <outline type="rss" title="${escapeXML(item.title)}" text="${escapeXML(item.title)}" htmlUrl="${escapeXML(item.htmlUrl)}" xmlUrl="${escapeXML(item.xmlUrl)}" />\n`;
                });
                opmlContent += `  </outline>\n`;
            });
            
            opmlContent += `</body>\n</opml>`;

            // 创建 Blob 并下载
            const blob = new Blob([opmlContent], { type: 'text/xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'feeds.opml';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast("OPML 文件已导出！");
        }

        // XML 字符转义工具
        function escapeXML(str) {
            return str.replace(/[<>&'"]/g, function (c) {
                switch (c) {
                    case '<': return '&lt;';
                    case '>': return '&gt;';
                    case '&': return '&amp;';
                    case '\'': return '&apos;';
                    case '"': return '&quot;';
                }
            });
        }

        // 显示通知
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.classList.remove('opacity-0', 'pointer-events-none');
            toast.classList.add('opacity-100');
            setTimeout(() => {
                toast.classList.remove('opacity-100');
                toast.classList.add('opacity-0', 'pointer-events-none');
            }, 2500);
        }

        // 初始化
        renderFeeds();
